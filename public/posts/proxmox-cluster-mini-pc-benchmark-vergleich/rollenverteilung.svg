<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3d2a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d2b1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="bold">Welcher Server für welche Aufgabe?</text>
  <text x="400" y="65" text-anchor="middle" fill="#94a3b8" font-size="12">Optimale Rollenverteilung im 3-Node Proxmox Cluster</text>

  <!-- Card 1: Dell OptiPlex -->
  <rect x="30" y="85" width="230" height="320" rx="10" fill="url(#card1)" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="30" y="85" width="230" height="50" rx="10" fill="#0ea5e9" opacity="0.3"/>
  <text x="145" y="108" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="bold">🖥️ Dell OptiPlex 3070</text>
  <text x="145" y="125" text-anchor="middle" fill="#64748b" font-size="10">i5-9500T · 32 GB RAM</text>

  <text x="145" y="158" text-anchor="middle" fill="#fbbf24" font-size="22">🏗️</text>
  <text x="145" y="180" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Haupt-Node</text>
  <text x="145" y="195" text-anchor="middle" fill="#94a3b8" font-size="10">Primäre VM-Node</text>

  <text x="50" y="218" fill="#38bdf8" font-size="10">✅ Bester RAM-Durchsatz</text>
  <text x="50" y="236" fill="#38bdf8" font-size="10">✅ Stärkster Multi-Core</text>
  <text x="50" y="254" fill="#38bdf8" font-size="10">✅ Beste Kompressionsleistung</text>
  <text x="50" y="272" fill="#38bdf8" font-size="10">✅ 6 Kerne für parallel Workloads</text>

  <text x="145" y="300" text-anchor="middle" fill="#64748b" font-size="10">💰 100 € gebraucht</text>
  <text x="145" y="315" text-anchor="middle" fill="#64748b" font-size="10">🥇 5 Goldmedaillen in Benchmarks</text>

  <text x="145" y="345" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Ideal für: VMs, Docker,</text>
  <text x="145" y="358" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Datenbanken, KI-Experimente</text>

  <!-- Card 2: HP ProDesk -->
  <rect x="285" y="85" width="230" height="320" rx="10" fill="url(#card2)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="285" y="85" width="230" height="50" rx="10" fill="#10b981" opacity="0.3"/>
  <text x="400" y="108" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">🖥️ HP ProDesk 400 G4</text>
  <text x="400" y="125" text-anchor="middle" fill="#64748b" font-size="10">i5-8500T · 32 GB RAM</text>

  <text x="400" y="158" text-anchor="middle" fill="#fbbf24" font-size="22">⚡</text>
  <text x="400" y="180" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Allrounder</text>
  <text x="400" y="195" text-anchor="middle" fill="#94a3b8" font-size="10">Aktueller Main-Host</text>

  <text x="305" y="218" fill="#34d399" font-size="10">✅ Solide Gesamtleistung</text>
  <text x="305" y="236" fill="#34d399" font-size="10">✅ 6 Kerne gut skalierend</text>
  <text x="305" y="254" fill="#34d399" font-size="10">✅ Gute RAM-Bandbreite</text>
  <text x="305" y="272" fill="#34d399" font-size="10">✅ Bewährt im Dauerbetrieb</text>

  <text x="400" y="300" text-anchor="middle" fill="#64748b" font-size="10">💰 ~70-90 € gebraucht</text>
  <text x="400" y="315" text-anchor="middle" fill="#64748b" font-size="10">⚠️ Unter Live-Last getestet</text>

  <text x="400" y="345" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Ideal für: Allround-Host,</text>
  <text x="400" y="358" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Testing, Zweit-VMs, Backup</text>

  <!-- Card 3: Futro -->
  <rect x="540" y="85" width="230" height="320" rx="10" fill="url(#card3)" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="540" y="85" width="230" height="50" rx="10" fill="#f59e0b" opacity="0.3"/>
  <text x="655" y="108" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="bold">🖥️ Fujitsu Futro S7010</text>
  <text x="655" y="125" text-anchor="middle" fill="#64748b" font-size="10">Intel J4125 · 16 GB RAM</text>

  <text x="655" y="158" text-anchor="middle" fill="#fbbf24" font-size="22">🛡️</text>
  <text x="655" y="180" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Firewall / Router</text>
  <text x="655" y="195" text-anchor="middle" fill="#94a3b8" font-size="10">Dedizierter Router-Host</text>

  <text x="560" y="218" fill="#fb923c" font-size="10">✅ Bester Single-Core</text>
  <text x="560" y="236" fill="#fb923c" font-size="10">✅ SHA256 so schnell wie i5</text>
  <text x="560" y="254" fill="#fb923c" font-size="10">✅ Nur 10W Stromverbrauch</text>
  <text x="560" y="272" fill="#fb923c" font-size="10">✅ Perfekte Skalierung (96%)</text>

  <text x="655" y="300" text-anchor="middle" fill="#64748b" font-size="10">💰 42 € gebraucht</text>
  <text x="655" y="315" text-anchor="middle" fill="#64748b" font-size="10">🥇 2 Goldmedaillen</text>

  <text x="655" y="345" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Ideal für: OPNSense, Pi-hole,</text>
  <text x="655" y="358" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">AdGuard, schlanke Dienste</text>

  <!-- Footer -->
  <line x1="30" y1="420" x2="770" y2="420" stroke="#334155" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" fill="#64748b" font-size="11">💡 Tipp: Alle 3 Server zusammen kosten dich weniger als ein neuer Gaming-PC – und du hast ein echtes Proxmox-Cluster!</text>
  <text x="400" y="465" text-anchor="middle" fill="#475569" font-size="10">Gesamtinvestition: ~212 € für 80 GB RAM + 16 CPU-Kerne</text>
  <text x="400" y="480" text-anchor="middle" fill="#475569" font-size="10">Makro Homelab Guide</text>
</svg>