<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bg)" rx="12"/>

  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">Proxmox Cluster Benchmark Vergleich</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">HP ProDesk 400 G4 · Dell OptiPlex 3070 Micro · Fujitsu Futro S7010</text>
  <line x1="80" y1="82" x2="720" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- === CPU Multi-Core (sysbench) === -->
  <text x="400" y="112" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">CPU Multi-Core (sysbench – events/sec, höher = besser)</text>

  <!-- HP - 2339 -->
  <text x="80" y="142" fill="#94a3b8" font-size="11">HP ProDesk G4</text>
  <rect x="180" y="128" width="327" height="20" rx="4" fill="url(#bar2)"/>
  <text x="520" y="143" fill="#22d3ee" font-size="12" font-weight="bold">2.339</text>

  <!-- Dell - 2617 -->
  <text x="80" y="175" fill="#94a3b8" font-size="11">Dell OptiPlex 3070</text>
  <rect x="180" y="161" width="366" height="20" rx="4" fill="url(#bar1)"/>
  <text x="555" y="176" fill="#38bdf8" font-size="12" font-weight="bold">2.617</text>
  <text x="585" y="176" fill="#fbbf24" font-size="10">🥇</text>

  <!-- Futro - 2359 -->
  <text x="80" y="208" fill="#94a3b8" font-size="11">Fujitsu Futro S7010</text>
  <rect x="180" y="194" width="330" height="20" rx="4" fill="url(#bar3)"/>
  <text x="520" y="209" fill="#fb923c" font-size="12" font-weight="bold">2.359</text>

  <!-- === CPU Single-Core (sysbench) === -->
  <text x="400" y="252" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">CPU Single-Core (sysbench – events/sec, höher = besser)</text>

  <!-- HP - 417 -->
  <text x="80" y="282" fill="#94a3b8" font-size="11">HP ProDesk G4</text>
  <rect x="180" y="268" width="108" height="20" rx="4" fill="url(#bar2)"/>
  <text x="298" y="283" fill="#22d3ee" font-size="12" font-weight="bold">417</text>

  <!-- Dell - 470 -->
  <text x="80" y="315" fill="#94a3b8" font-size="11">Dell OptiPlex 3070</text>
  <rect x="180" y="301" width="122" height="20" rx="4" fill="url(#bar1)"/>
  <text x="312" y="316" fill="#38bdf8" font-size="12" font-weight="bold">470</text>

  <!-- Futro - 614 -->
  <text x="80" y="348" fill="#94a3b8" font-size="11">Fujitsu Futro S7010</text>
  <rect x="180" y="334" width="159" height="20" rx="4" fill="url(#bar3)" filter="url(#glow)"/>
  <text x="349" y="349" fill="#fb923c" font-size="12" font-weight="bold">614</text>
  <text x="380" y="349" fill="#fbbf24" font-size="10">🥇</text>

  <!-- === RAM Durchsatz === -->
  <text x="400" y="392" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">RAM Durchsatz (MiB/sec, höher = besser)</text>

  <!-- HP - 19161 -->
  <text x="80" y="422" fill="#94a3b8" font-size="11">HP ProDesk G4</text>
  <rect x="240" y="408" width="258" height="20" rx="4" fill="url(#bar2)"/>
  <text x="508" y="423" fill="#22d3ee" font-size="12" font-weight="bold">19.161</text>

  <!-- Dell - 21663 -->
  <text x="80" y="455" fill="#94a3b8" font-size="11">Dell OptiPlex 3070</text>
  <rect x="240" y="441" width="292" height="20" rx="4" fill="url(#bar1)"/>
  <text x="542" y="456" fill="#38bdf8" font-size="12" font-weight="bold">21.663</text>
  <text x="575" y="456" fill="#fbbf24" font-size="10">🥇</text>

  <!-- Futro - 11540 -->
  <text x="80" y="488" fill="#94a3b8" font-size="11">Fujitsu Futro S7010</text>
  <rect x="240" y="474" width="155" height="20" rx="4" fill="url(#bar3)"/>
  <text x="405" y="489" fill="#fb923c" font-size="12" font-weight="bold">11.540</text>

  <!-- === 7-Zip Kompression === -->
  <text x="400" y="532" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">7-Zip Kompression (Rating, höher = besser)</text>

  <!-- HP - 27108 -->
  <text x="80" y="562" fill="#94a3b8" font-size="11">HP ProDesk G4</text>
  <rect x="240" y="548" width="236" height="20" rx="4" fill="url(#bar2)"/>
  <text x="486" y="563" fill="#22d3ee" font-size="12" font-weight="bold">27.108</text>

  <!-- Dell - 32101 -->
  <text x="80" y="595" fill="#94a3b8" font-size="11">Dell OptiPlex 3070</text>
  <rect x="240" y="581" width="280" height="20" rx="4" fill="url(#bar1)"/>
  <text x="530" y="596" fill="#38bdf8" font-size="12" font-weight="bold">32.101</text>
  <text x="565" y="596" fill="#fbbf24" font-size="10">🥇</text>

  <!-- Futro - 11671 -->
  <text x="80" y="628" fill="#94a3b8" font-size="11">Fujitsu Futro S7010</text>
  <rect x="240" y="614" width="102" height="20" rx="4" fill="url(#bar3)"/>
  <text x="352" y="629" fill="#fb923c" font-size="12" font-weight="bold">11.671</text>

  <!-- === Verschlüsselung (AES-256) === -->
  <text x="400" y="672" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">AES-256 Verschlüsselung (MB/sec, höher = besser)</text>

  <!-- HP - 3923 -->
  <text x="80" y="702" fill="#94a3b8" font-size="11">HP ProDesk G4</text>
  <rect x="220" y="688" width="225" height="20" rx="4" fill="url(#bar2)"/>
  <text x="455" y="703" fill="#22d3ee" font-size="12" font-weight="bold">3.923</text>

  <!-- Dell - 5585 -->
  <text x="80" y="735" fill="#94a3b8" font-size="11">Dell OptiPlex 3070</text>
  <rect x="220" y="721" width="320" height="20" rx="4" fill="url(#bar1)"/>
  <text x="550" y="736" fill="#38bdf8" font-size="12" font-weight="bold">5.585</text>
  <text x="585" y="736" fill="#fbbf24" font-size="10">🥇</text>

  <!-- Futro - 2842 -->
  <text x="80" y="768" fill="#94a3b8" font-size="11">Fujitsu Futro S7010</text>
  <rect x="220" y="754" width="163" height="20" rx="4" fill="url(#bar3)"/>
  <text x="393" y="769" fill="#fb923c" font-size="12" font-weight="bold">2.842</text>

  <!-- === Legende + Fazit === -->
  <line x1="80" y1="790" x2="720" y2="790" stroke="#334155" stroke-width="1"/>

  <rect x="120" y="808" width="12" height="12" rx="3" fill="url(#bar1)"/>
  <text x="140" y="818" fill="#94a3b8" font-size="11">Dell OptiPlex</text>

  <rect x="310" y="808" width="12" height="12" rx="3" fill="url(#bar2)"/>
  <text x="330" y="818" fill="#94a3b8" font-size="11">HP ProDesk</text>

  <rect x="500" y="808" width="12" height="12" rx="3" fill="url(#bar3)"/>
  <text x="520" y="818" fill="#94a3b8" font-size="11">Fujitsu Futro</text>

  <!-- Summary -->
  <rect x="150" y="840" width="500" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="856" text-anchor="middle" fill="#fbbf24" font-size="12">🥇 Dell OptiPlex: 5× Gold · Fujitsu Futro: 2× Gold (Single-Core + SHA256)</text>
  <text x="400" y="872" text-anchor="middle" fill="#64748b" font-size="11">HP ProDesk unter Live-Homelab-Last getestet – reale Leistung liegt näher am Dell</text>
</svg>
